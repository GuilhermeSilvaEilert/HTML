<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Cores em RGB</title>
        <style>
            body{
                background-color: rgb(150, 200, 255);
            }
            .listItem{
                background-color: rgb(200, 200, 200);
            }
            #lista{
                background-color: rgb(150,140,130);
            }
        </style>
        <link rel="stylesheet" href="CSS/CoresRGB.css"/>
    </head>
    <body>
        <h1 style="background-color: rgb(255, 200, 150);">Ficha de RPG</h1>
        <h2>Lista de personagens</h2>
        <ol id="lista">
            <li class="listItem">Anão</li>
            <li class="listItem">Elfo</li>
            <li class="listItem">Orc</li>
            <li class="listItem">Fada</li>
        </ol>
        <h3>Elfo</h3>
        <p>São seres, inteligentes com aptidão para magia</p>
        <table id="table">
            <tr>
                <th class="tableHead">Foto</th>
                <th class="tableHead"><img src="img/RPG/Elfo.webp" alt="Elfo"/></th>
            </tr>
            <tr>
                <td class="tableData">Vida</td>
                <td class="tableData">150</td>
            </tr>
            <tr>
                <td class="tableData">Força</td>
                <td class="tableData">50</td>
            </tr>
            <tr>
                <td class="tableData">Mana</td>
                <td class="tableData">50</td>
            </tr>
            <tr>
                <td class="tableData">Constituição</td>
                <td class="tableData">150</td>
            </tr>
        </table>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>HSL</title>
        <style>
            body{
                background-color: hsl(0, 4%, 5%);
            }
            .listItem{
                background-color: hsl(0, 0%, 33%);
            }
            #ol{
                background-color: hsl(0, 0%, 50%);
            }
            h2{
                background-color: hsl(0, 0%, 90%);
            }
        </style>
        <link rel="stylesheet" href="CSS/HSL.css"/>
    </head>
    <body>
        <h1 style="color: hsl(0, 50%, 50%); background-color: hsl(0, 20%, 20%);">Ficha de RPG</h1>
        <h2>Lista de personagens</h2>
        <ol id="ol">
            <li class="listItem">Orc</li>
            <li class="listItem">Humano</li>
            <li class="listItem">Anão</li>
            <li class="listItem">Elfo</li>            
        </ol>
        <div>
            <h3>Anão</h3>
            <p id="paragrafo">São seres peculiares, fortes, orgulhos e curtem boa bebedeira</p>    
            <table>
                <tr>
                    <th class="tableCel1">Atributo</th>
                    <th class="tableCel2">Conteúdo</th>                
                </tr>            
                <tr>
                    <td class="tableCel2">Foto</td>
                    <td class="tableCel1"><img src="img/RPG/Anão.webp" alt="Anão"/></td>
                </tr>
                <tr>
                    <td class="tableCel1">Vida</td>
                    <td class="tableCel2">500</td>
                </tr>
                <tr>
                    <td class="tableCel2">Força</td>
                    <td class="tableCel1">200</td>                
                </tr>
                <tr>
                    <td class="tableCel1">Constituição</td>
                    <td class="tableCel2">150</td>                
                </tr>
            </table>
        </div>        
    </body>
</html>

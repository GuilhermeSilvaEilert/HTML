<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Comentários css</title>
        <style>
            h2{
                color:blue;
                background-color: brown;
                font-size: 20px;
            }
            p{
                color:rgb(212, 0, 255);
                background-color: rgb(0, 0, 0);
                font-size: 15px;
            }
        </style>
    </head>
    <body>
        <h1 style="color: blueviolet; background-color: black; font-size: 25px;">Ficha de RPG</h1>
        <h2>Personagens do RPG</h2>
        <div>
            <ol>
                <li>Orc</li>
                <li>Fada</li>
                <li>Elfo</li>
                <li>Anão</li>
                <li>Humano</li>
            </ol>
        </div>
        <h3>Orc</h3>
        <p>São barbaros e desajeitados, mas compensam com sua força e coragem</p>
        <table>
            <tr>
                <th>Atributo</th>
                <th>Conteúdo</th>
            </tr>
            <tr>
                <td>Foto</td>
                <td><img src="img/RPG/Orc.webp" alt="Orc"></td>
            </tr>
            <tr>
                <td>Vida</td>
                <td>500</td>
            </tr>
            <tr>
                <td>Força</td>
                <td>100</td>
            </tr>
        </table>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" conten="width=device-width, initial-scale=1.0"/>
        <title>Nome das Cores do CSS</title>
        <style>
            ol{
                background-color: black;
            }
            .listItem{
                color: blueviolet;
            }
            #titleTwo{
                background-color: blueviolet;
            }
        </style>
        <link rel="stylesheet" href="CSS/NomeDasCoresCSS.css"/>
    </head>
    <body style="background-color: grey;">
        <h1 style="color: blueviolet; background-color: black;">Ficha de RPG</h1>
        <h2 id="titleTwo">Lista dos personagens</h2>
        <ol>
            <li class="listItem">Orc</li>
            <li class="listItem">Humano</li>
            <li class="listItem">Fada</li>
            <li class="listItem">Anão</li>
        </ol>
        <h3>Orc</h3>
        <P id="paragrafo">
            São elfos torturados e mutilados para que tenham uma <br/>
            aparencia e uma forma mais forte que o elfo comum.
        </P>
        <table>
            <tr>
                <th class="th-td">Atributo</th>
                <th class="th-td">Conteúdo</th>
            </tr>
            <tr>
                <td class="th-td">Foto</td>
                <td class="th-td"><img src="img/RPG/Orc.webp" alt="Orc"/></td>
            </tr>
            <tr>
                <td class="th-td">Vida</td>
                <td class="th-td">250</td>
            </tr>
            <tr>
                <td class="th-td">Força</td>
                <td class="th-td">150</td>
            </tr>
        </table>
    </body>
</html>

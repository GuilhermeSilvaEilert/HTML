<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=width-devide, initial-scale=1.0"/>
        <title>Backgroundo com opacidade</title>
        <style>
            body{
                background-color: burlywood;
            }
            #li1{
                background-color: rgba(0, 88, 118, 0.50);
            }
            #li2{
                background-color: rgba(0, 88, 118, 0.4);
            }            
            #li3{
                background-color: rgba(0, 88, 118, 0.6);
            }
            #li4{
                background-color: rgba(0, 88, 118, 0.8);
            }
        </style>
        <link rel="stylesheet" href="CSS/BackgroundOpacidade.css"/>
    </head>
    <body>
        <h1 style="background-color: #005876; opacity: 0.8;">Titulo 1 com opacidade</h1>
        <ol>
            <li id="li1">Opacidade 0.2</li>            
            <li id="li2">Opacidade 0.4</li>
            <li id="li3">Opacidade 0.6</li>
            <li id="li4">Opacidade 0.8</li>
        </ol>
        <h2 class="titles">Titulo 2 com opacidade</h2>
        <h3 class="titles">Titulo 3 com opacidade</h3>
        <table>
            <tr>
                <th>Teste de opacidade</th>
                <th>Valor</th>                
            </tr>
            <tr>
                <td>Teste</td>
                <td id="tableData2">0.2</td>                
            </tr>
            <tr>
                <td>Teste</td>
                <td id="tableData4">0.4</td>                
            </tr>
            <tr>
                <td>Teste</td>
                <td id="tableData6">0.6</td>                
            </tr>
            <tr>
                <td>Teste</td>
                <td id="tableData8">0.8</td>                
            </tr>            
        </table>
    </body>
</html>

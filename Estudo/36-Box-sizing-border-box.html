<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Box Sizing</title>
        <link rel= "stylesheet" href="CSS/Box-sizing.css"/>
    </head>
    <body style="background-color: #b88e05;">
        <h1 class="title">Cavaleiros dos Zodiaco</h1>
        <h2 class="title">Cavaleiros de Bronze</h2>
        <ol id="listbody">
            <li class="listItem">Seiya</li>
            <li class="listItem">Hyoga</li>            
            <li class="listItem">Shiryu</li>
            <li class="listItem">Shun</li>
            <li class="listItem">Ikki</li>
            <li class="listItem">Jabu</li>
        </ol>
        <h3 class="title">Ficha dos Cavaleiros</h3>
        <div id="tableBody">
            <table class="tableStyle">
                <tr class="tableRow">
                    <th class="tableHead">Nome</th>
                    <th class="tableHead">Foto</th>
                    <th class="tableHead">Constelação</th>                    
                </tr>
                <tr class="tableStyle">
                    <td class="tableData">Seiya</td>
                    <td class="tableData"><img src="img/Cavaleiros dos Zodiaco/Seiya.jpg" alt="Seiya de pagasus"/></td>
                    <td class="tableData">Pegasus</td>                    
                </tr>
                <tr class="tableRow">
                    <td class="tableData">Shiryu</td>
                    <td class="tableData"><img src="img/Cavaleiros dos Zodiaco/Shiryu.jpg" alt="Shiryu de dragão"/></td>
                    <td class="tableData">Pegasus</td>
                </tr>
            </table>
        </div>
    </body>
</html>

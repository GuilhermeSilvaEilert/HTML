<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Classes e ids</title>
        <style>
            h2{
                color: aqua;
                background-color: darkred;
                font-size: 15px;
            }
            .listelement{
                color:blueviolet;
                background-color: darkblue;
                padding: 5px;
                font-size: 20px;
            }
        </style>
        <link rel="stylesheet" href="CSS/Classes.css"/>
    </head>
    <body>
        <h1 style="color: blueviolet; background-color: black; padding: 10px;">Ficha de RPG</h1>
        <h2>Personagens</h2>
        <div>
            <ol>
                <li class="listelement">Orc</li>
                <li class="listelement">Humano</li>
                <li class="listelement">Elfo</li>
                <li class="listelement">Anão</li>
                <li class="listelement">Fada</li>
            </ol>
        </div>    
        <h3>Orc</h3>
        <p>São elfos corrompidos com magia negra e assumem a sua forma barbara</p>
        <table>
            <tr>
                <th>Atributo</th>
                <th>Conteudo</th>
            </tr>
            <tr>
                <td class="tableData">Foto</td>
                <td class="tableData"><img src="img/RPG/Orc.webp" alt="Orc"/></td>
            </tr>
            <tr>
                <td class="tableData">Vida</td>
                <td class="tableData">500</td>
            </tr>
            <tr>
                <td class="tableData">Força</td>
                <td class="tableData">250</td>
            </tr>
        </table>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Multiplas regras</title>
    </head>
    <body style="color: brown;">
        <h1 style="color: blueviolet; font-style: italic;">Ficha de RPG</h1>
        <h2>Raças abordadas no artigo</h2>
        <ol style="color: black; font-size: 20px;">
            <li style="color: rgb(10, 0, 29);">Anões</li>
            <li>Humanos</li>
            <li>Elfos</li>
            <li>Fadas</li>
        </ol>
        <h2 style="color: blue; font-size: 40px;">Anões</h2>
        <p style="color: darkred; font-size: 30px; border-bottom: 1px solid red;">
            Anões são pequenos e fortes, não são muito inteligentes ou sabios<br/>
            mas, compensam com seu estilo unico de ser. 
        </p>
        <table style="border: 1px solid black;">
            <tr>
                <th>Atributos de raça</th>
                <th>Conteúdo</th>
            </tr>
            <tr>
                <td>Foto</td>
                <td><img src="img/RPG/Anão.webp"></td>
            </tr>
            <tr style="color: blue;">
                <td>Vida</td>
                <td>50</td>
            </tr>
            <tr>
                <td>Força</td>
                <td>100</td>
            </tr>
        </table>
        <h2>Humanos</h2>
        <h2>Elfos</h2>
        <h2>Fadas</h2>
    </body>
</html>
